<script>
    function resizePage(device) {
        var images = document.querySelectorAll('.col-md-3, .col-md-6, .col-12');
        
        images.forEach(function(img) {
            if (device === 'desktop') {
                img.className = 'col-md-3';
            } else if (device === 'tablet') {
                img.className = 'col-md-6';
            } else if (device === 'mobile') {
                img.className = 'col-12';
            }
        });
    }
</script>
